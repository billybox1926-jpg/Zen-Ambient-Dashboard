<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zen Ambient</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="container">
        <!-- Clock -->
        <div id="clock">00:00</div>
        <!-- Date -->
        <div id="date">Monday, January 1</div>
        <!-- WEATHER GLANCE (New) -->
        <div id="weather">🌤️ --°C</div>
        <!-- Breathing Circle -->
        <div id="breath-circle" class="circle">
          <span id="breath-text">Breathe</span>
        </div>

        <!-- === NEW: POMODORO TIMER === -->
        <div class="timer-container">
          <svg class="timer-ring" width="120" height="120" viewBox="0 0 120 120">
            <!-- Background ring -->
            <circle class="timer-ring-bg" cx="60" cy="60" r="54" />
            <!-- Progress ring (stroke-dasharray = 2*pi*54 ≈ 339.292) -->
            <circle class="timer-ring-progress" cx="60" cy="60" r="54" 
                    id="timer-ring" stroke-dasharray="339.292" stroke-dashoffset="0" />
          </svg>
          <div class="timer-display" id="timer-display">25:00</div>
        </div>

        <div class="timer-controls">
          <button id="timer-start" class="timer-btn">▶ Start</button>
          <button id="timer-reset" class="timer-btn">⟲ Reset</button>
        </div>
        <!-- === END POMODORO === -->

        <!-- Ambient Toggle -->
        <button id="ambient-toggle">🌧️ Play Rain</button>
        <!-- Quote -->
        <p id="quote">"Peace comes from within."</p>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
