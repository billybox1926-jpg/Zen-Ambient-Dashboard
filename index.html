<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zen Ambient</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="container">
        <!-- Clock -->
        <div id="clock">00:00</div>
        <!-- Date -->
        <div id="date">Monday, January 1</div>
        <!-- WEATHER GLANCE (New) -->
        <div id="weather">🌤️ --°C</div>
        <!-- Breathing Circle -->
        <div id="breath-circle" class="circle">
          <span id="breath-text">Breathe</span>
        </div>
        <!-- Ambient Sound Toggle (Placeholder) -->
        <button id="ambient-toggle">🌧️ Play Rain</button>
        <!-- Quote -->
        <p id="quote">"Peace comes from within."</p>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
